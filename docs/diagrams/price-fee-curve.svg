<text x="980" y="282.09999999999997" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#c92a2a" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="980" dy="0">Toward RP: decaying fee</tspan><tspan x="980" dy="16.8">Away from RP: fee = 0</tspan></text>
<text x="350" y="613.75" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="15" fill="#364fc7" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="350" dy="0">closeBoundaryFee = 1 - priceRatio / (1-optimalFee)</tspan></text>
<text x="835" y="613.75" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="15" fill="#e67700" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="835" dy="0">farBoundaryFee = 1 - (1-optimalFee) × priceRatio</tspan></text>
<text x="140" y="230.75" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="15" fill="#2b8a3e" text-anchor="start" opacity="1" dominant-baseline="auto"><tspan x="140" dy="0">targetFee</tspan></text>
<text x="530" y="668.75" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="15" fill="#2b8a3e" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="530" dy="0">targetFee = farBoundaryFee − closeBoundaryFee / 2</tspan></text>
