<text x="525" y="59" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="16" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="525" dy="0">Previous Swap State</tspan></text>
<text x="125" y="136.9" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#495057" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="125" dy="0">1. Reset</tspan></text>
<text x="395" y="136.9" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#495057" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="395" dy="0">2. Adjust Upward</tspan></text>
<text x="665" y="136.9" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#495057" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="665" dy="0">3. Cap at Far Boundary</tspan></text>
<text x="925" y="136.9" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#495057" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="925" dy="0">4. Pass-Through</tspan></text>
<text x="160" y="180.1" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="160" dy="0">previousFee = UNDEFINED</tspan><tspan x="160" dy="16.8">OR price crossed RP</tspan></text>
<text x="420" y="180.1" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="420" dy="0">Price moved further</tspan><tspan x="420" dy="16.8">from RP</tspan></text>
<text x="680" y="180.1" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="680" dy="0">Price toward RP AND</tspan><tspan x="680" dy="16.8">prevFee &gt; farBoundaryFee</tspan></text>
<text x="940" y="180.1" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="940" dy="0">Price toward RP AND</tspan><tspan x="940" dy="16.8">prevFee &lt;= farBoundaryFee</tspan></text>
<text x="160" y="308.5" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="160" dy="0">decayStartFee = farBoundaryFee</tspan></text>
<text x="420" y="298.09999999999997" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="420" dy="0">decayStartFee =</tspan><tspan x="420" dy="16.8">1 - movementRatio*(1-prevFee)</tspan></text>
<text x="680" y="308.5" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="680" dy="0">decayStartFee = farBoundaryFee</tspan></text>
<text x="940" y="308.5" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="940" dy="0">decayStartFee = previousFee</tspan></text>
<text x="525" y="454.40000000000003" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="16" fill="#000000" text-anchor="middle" opacity="1" dominant-baseline="auto"><tspan x="525" dy="0">Exponential Decay</tspan><tspan x="525" dy="19.2">decayingFee = target + k^blocks * (decayStartFee - target)</tspan></text>
<text x="790" y="573.3" font-family="'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace" font-size="14" fill="#000000" text-anchor="start" opacity="1" dominant-baseline="auto"><tspan x="790" dy="0">Invariants:</tspan><tspan x="790" dy="16.8">* decayStartFee &gt;= previousFee (path 2)</tspan><tspan x="790" dy="16.8">* decayStartFee &lt;= farBoundaryFee (path 3)</tspan><tspan x="790" dy="16.8">* decayingFee -&gt; targetFee as blocks-&gt;inf</tspan></text>
